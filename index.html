<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="First Light" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png" />
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png" />
<link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon-120.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<meta name="theme-color" content="#232A4D" />
<title>First Light</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,ital@9..144,300..700,0..1&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --night:#232A4D;
    --night-2:#2E3760;
    --parchment:#EFE3CC;
    --ink:#2A2620;
    --line: rgba(42,38,32,0.14);
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--parchment); color:var(--ink); font-family:'Work Sans', sans-serif; -webkit-font-smoothing:antialiased; }
  .mono{font-family:'IBM Plex Mono', monospace;}

  .band{ background: linear-gradient(180deg, var(--night) 0%, var(--night-2) 100%); color:#EFE3CC; padding: 28px 20px 30px; }
  .band-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .band h1{ font-family:'Fraunces', serif; font-weight:600; font-size:26px; margin:0 0 4px; letter-spacing:0.2px; }
  .band .desc{ font-size:13px; opacity:0.75; margin:0; max-width:480px; line-height:1.4; }
  .band .date{ font-family:'IBM Plex Mono', monospace; font-size:12px; opacity:0.7; text-align:right; white-space:nowrap; }
  .sync-dot{ width:10px; height:10px; border-radius:50%; display:inline-block; background:#8b8b8b; cursor:pointer; box-shadow:0 0 0 2px rgba(239,227,204,0.2); flex-shrink:0; }

  .arc-wrap{ margin-top:18px; display:flex; flex-direction:column; align-items:center; }
  .arc-label{ font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; opacity:0.65; margin-top:8px; }
  .arc-frac{ font-family:'Fraunces', serif; font-size:15px; margin-top:2px; opacity:0.9; }
  .arc-empty{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; opacity:0.55; margin-top:6px; max-width:260px; text-align:center; }

  .content{ max-width:760px; margin:0 auto; padding: 22px 16px 56px; }
  .grid{ display:grid; grid-template-columns: 1fr; gap:16px; }
  @media (min-width: 680px){ .grid{ grid-template-columns: 1fr 1fr; } }

  .card{ background:#FBF6EA; border:1px solid var(--line); border-radius:14px; padding:18px 18px 16px; box-shadow: 0 1px 0 rgba(42,38,32,0.03); }
  .card.full{ grid-column: 1 / -1; }
  .card-head{ display:flex; align-items:baseline; gap:10px; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--line); }
  .card-head .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .card-head h2{ font-family:'Fraunces', serif; font-weight:600; font-size:18px; margin:0; }
  .card-head .sub{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; opacity:0.5; text-transform:uppercase; letter-spacing:1px; margin-left:auto; }
  .icon-btn{ background:none; border:none; cursor:pointer; opacity:0.4; font-size:14px; padding:2px 4px; }
  .icon-btn:hover{ opacity:0.85; }
  .icon-btn.mini{ font-size:11px; padding:1px 3px; flex-shrink:0; }
  .icon-btn.mini.dots{ font-size:16px; padding:0 5px; line-height:1; }

  .row{ display:flex; align-items:center; gap:12px; padding:9px 0; }
  .row + .row{ border-top:1px dashed var(--line); }
  .row .label{ flex:1; font-size:14.5px; line-height:1.3; }
  .row .meta{ font-family:'IBM Plex Mono', monospace; font-size:11px; opacity:0.55; white-space:nowrap; }
  .check{ width:24px; height:24px; border-radius:7px; border:1.5px solid rgba(42,38,32,0.25); background:transparent; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition: background 0.15s, border-color 0.15s; }
  .check.on{ border-color:transparent; }
  .check svg{ width:13px; height:13px; opacity:0; transition:opacity 0.15s; }
  .check.on svg{ opacity:1; }
  .streak{ font-family:'IBM Plex Mono', monospace; font-size:11px; padding:2px 7px; border-radius:20px; background:rgba(42,38,32,0.06); white-space:nowrap; }

  .tally{ display:flex; gap:5px; }
  .tally .tick{ width:16px; height:16px; border-radius:5px; border:1.5px solid rgba(42,38,32,0.25); flex-shrink:0; }
  .tally .tick.on{ border-color:transparent; }

  .stage-row{ display:flex; gap:5px; margin-top:4px; flex-wrap:wrap; }
  .stage-pill{ flex:1; min-width:54px; text-align:center; font-family:'IBM Plex Mono', monospace; font-size:9.5px; padding:6px 2px; border-radius:7px; border:1.5px solid rgba(42,38,32,0.18); cursor:pointer; text-transform:uppercase; letter-spacing:0.3px; color:var(--ink); opacity:0.55; background:transparent; }
  .stage-pill.on{ border-color:transparent; color:#fff; opacity:1; }

  .progress-track{ flex:1; height:7px; background:rgba(42,38,32,0.08); border-radius:6px; position:relative; }
  .progress-fill{ position:absolute; left:0; top:0; bottom:0; border-radius:6px; }

  input[type=text], input[type=number], select{ font-family:'Work Sans', sans-serif; font-size:13.5px; border:1px solid var(--line); border-radius:8px; padding:7px 10px; background:#fff; width:100%; }
  .add-row{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .add-row input{ flex:1; min-width:120px; }
  .add-row button, .util-btn{ font-family:'IBM Plex Mono', monospace; font-size:11px; border:none; border-radius:8px; padding:0 12px; height:34px; cursor:pointer; color:#fff; white-space:nowrap; }
  .util-btn.outline{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  .util-btn.tiny{ height:28px; font-size:10.5px; padding:0 9px; }

  .item-row{ display:flex; align-items:center; gap:10px; padding:6px 0; font-size:13.5px; }
  .item-row .name{ flex:1; }
  .item-row .name.done{ text-decoration:line-through; opacity:0.5; }
  .small-x{ background:none; border:none; cursor:pointer; opacity:0.35; font-size:14px; padding:2px; }
  .small-x:hover{ opacity:0.8; }

  .goal-form{ background:rgba(42,38,32,0.035); border:1px dashed var(--line); border-radius:10px; padding:12px; margin-top:10px; display:flex; flex-direction:column; gap:8px; }
  .goal-form label{ font-family:'IBM Plex Mono', monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; opacity:0.55; margin-bottom:2px; display:block; }
  .form-row{ display:flex; gap:8px; }
  .form-row > div{ flex:1; }
  .form-actions{ display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }
  .type-hint{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; opacity:0.5; line-height:1.4; }

  .new-cat-card{ display:flex; gap:8px; }
  .new-cat-card input{ flex:1; }

  .summary-stat{ display:flex; align-items:center; justify-content:space-between; padding:7px 0; font-size:13.5px; }
  .summary-stat + .summary-stat{ border-top:1px dashed var(--line); }
  .summary-section-label{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:1px; opacity:0.5; margin:14px 0 2px; }
  .summary-section-label:first-child{ margin-top:0; }

  .score-month{ padding:14px 0; }
  .score-month + .score-month{ border-top:1px solid var(--line); }
  .score-month-head{ display:flex; align-items:center; gap:12px; }
  .score-month-name{ font-family:'Fraunces', serif; font-size:15.5px; font-weight:600; flex:1; }
  .score-badge{ font-family:'Fraunces', serif; font-weight:600; font-size:15px; color:#fff; border-radius:8px; padding:3px 11px; min-width:42px; text-align:center; }
  .score-live-tag{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:0.5px; opacity:0.5; }
  .score-cats{ display:flex; gap:6px; margin-top:9px; flex-wrap:wrap; }
  .score-chip{ font-family:'IBM Plex Mono', monospace; font-size:10px; padding:3px 8px; border-radius:20px; color:#fff; white-space:nowrap; }
  .score-chip.na{ background:rgba(42,38,32,0.08); color:var(--ink); opacity:0.45; }

  .footer-note{ text-align:center; font-family:'IBM Plex Mono', monospace; font-size:10.5px; opacity:0.4; margin-top:30px; }
  .loading{ padding:60px 20px; text-align:center; font-family:'IBM Plex Mono', monospace; color:var(--night); opacity:0.6; }
  .backup-bar{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .empty-state{ font-family:'IBM Plex Mono', monospace; font-size:12px; opacity:0.5; text-align:center; padding:30px 10px; }
  .guide-card{ padding:22px 20px; }
  .guide-card h3{ font-family:'Fraunces', serif; font-size:19px; margin:0 0 6px; }
  .guide-card p.lead{ font-size:13.5px; opacity:0.75; margin:0 0 16px; line-height:1.5; }
  .guide-step{ display:flex; gap:12px; margin-bottom:14px; align-items:flex-start; }
  .guide-step .num{ font-family:'Fraunces', serif; font-weight:600; font-size:15px; width:26px; height:26px; border-radius:50%; background:#232A4D; color:#EFE3CC; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .guide-step .txt{ font-size:13.5px; line-height:1.5; }
  .guide-step .txt b{ font-weight:600; }
  .guide-types{ margin-top:6px; border-top:1px solid var(--line); padding-top:14px; }
  .guide-type-row{ display:flex; gap:10px; padding:6px 0; font-size:13px; align-items:baseline; }
  .guide-type-row .tname{ font-weight:600; min-width:78px; flex-shrink:0; }
  .guide-type-row .tdesc{ opacity:0.7; line-height:1.4; }
  .guide-note{ font-family:'IBM Plex Mono', monospace; font-size:11px; opacity:0.5; margin-top:14px; line-height:1.5; }
  .card-head .dot.dot-pick{ cursor:pointer; width:14px; height:14px; transition: transform 0.1s; }
  .card-head .dot.dot-pick:hover{ transform: scale(1.15); }
  .cat-name-input{
    font-family:'Fraunces', serif; font-weight:600; font-size:18px; border:1px solid var(--line); background:#fff;
    padding:4px 8px; border-radius:7px; flex:1; min-width:60px; color:var(--ink);
  }
  .cat-name-input:focus{ outline:none; border-color:rgba(42,38,32,0.4); }
  .swatch-row{ display:flex; gap:8px; margin-bottom:12px; padding-bottom:12px; border-bottom:1px dashed var(--line); }
  .swatch{ width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
  .swatch.on{ border-color:var(--ink); }
  .toast{ background:#232A4D; color:#EFE3CC; font-family:'IBM Plex Mono', monospace; font-size:12px; padding:11px 16px; border-radius:10px; margin-bottom:14px; text-align:center; }
  .icon-btn.confirming, .small-x.confirming{ color:#fff; background:#A8444B; opacity:1; border-radius:6px; padding:2px 7px; font-family:'IBM Plex Mono', monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:0.4px; }
</style>

<body>

<div class="band">
  <div class="band-top">
    <div>
      <h1>First Light</h1>
      <p class="desc">A daily dashboard to track habits, goals, and progress over time.</p>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <span class="sync-dot" id="syncDot" onclick="toggleSyncSettings()" title="Sync status"></span>
      <div class="date mono" id="dateLabel"></div>
    </div>
  </div>
  <div class="arc-wrap" id="arcWrap"></div>
</div>

<div class="content">
  <div id="app" class="loading">loading your dashboard…</div>
</div>

<input type="file" id="importFile" accept="application/json" style="display:none" />

<script>
const STORAGE_KEY = 'first-light-template-v1';
const PALETTE = ['#C99A3B','#C1623D','#6E8B6B','#B06A78','#6B7585','#4B7B7E','#8B6BA8','#5C8AA6'];

function todayStr(d=new Date()){
  const tz = new Date(d.getTime() - d.getTimezoneOffset()*60000);
  return tz.toISOString().slice(0,10);
}
function monthKey(dateStr){ return dateStr.slice(0,7); }
function thisMonth(){ return monthKey(todayStr()); }
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return todayStr(d);
}
function weekDates(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const dow = (d.getDay()+6)%7;
  const monday = addDays(dateStr, -dow);
  return Array.from({length:7}, (_,i)=>addDays(monday,i));
}
function pad2(n){ return String(n).padStart(2,'0'); }
function daysInMonth(m){ const [y,mo]=m.split('-').map(Number); return new Date(y,mo,0).getDate(); }
function daysConsideredFor(m){ return m===thisMonth() ? new Date().getDate() : daysInMonth(m); }
function clampPct(n){ return Math.max(0, Math.min(100, n)); }
function uid(prefix){ return prefix + Date.now() + Math.floor(Math.random()*1000); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function defaultState(){
  return { categories: [], goals: [], checkLogs: {}, tallyLogs: {}, amountLogs: {}, stageState: {}, stageHistory: {}, listItems: {}, meta: {} };
}

let state = null;
let ui = { addingGoalFor:null, draft:{}, toast:null, confirmDeleteCategory:null, confirmDeleteGoal:null };

function showToast(msg){
  ui.toast = msg;
  render();
  setTimeout(() => { if(ui.toast===msg){ ui.toast=null; render(); } }, 3500);
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? Object.assign(defaultState(), JSON.parse(raw)) : defaultState();
  } catch(e){ console.error('Could not read local storage', e); state = defaultState(); }
  if(!state.meta) state.meta = {};
  if(!state.meta.firstUseAt){ state.meta.firstUseAt = todayStr(); saveState(); }
  // Self-heal: a form bug could previously save a tally goal with an invalid
  // cadence (e.g. 'daily', left over from switching goal type without
  // re-selecting "how often"). That silently broke both the weekly reset
  // and the scorecard grading for that goal. Fix it in place.
  let healed = false;
  state.goals.forEach(g => {
    if(g.type==='tally' && !['weekly','monthly','yearly'].includes(g.cadence)){
      g.cadence = 'weekly';
      healed = true;
    }
  });
  if(healed) saveState();
  render();
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.error('Could not write to local storage', e); }
  if(getSyncCode()){
    try{ localStorage.setItem(DIRTY_KEY, String(Date.now())); } catch(e){}
    queueSync();
  }
}

/* ---------- Cloud sync (Supabase) ---------- */
const SUPABASE_URL = 'https://ctxnyfgdiugzhskumqpm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0eG55ZmdkaXVnemhza3VtcXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxODUxNzgsImV4cCI6MjA5ODc2MTE3OH0.waXx4gHFKwRJWNloGRhIpe7TH5UVn1N_jPLgaAn2oEY';
const SYNC_TABLE = 'first_light';
const CODE_KEY = 'first-light-sync-code';
const DIRTY_KEY = 'first-light-sync-dirty';
const REV_KEY = 'first-light-sync-rev'; // last revision this device has confirmed as saved to the cloud
let syncStatus = 'off';
let syncTimer = null;
let pushSeq = 0; // increments on every successful push; lets in-flight pulls detect they're stale

// Revision is a plain integer that only the database ever assigns and
// increments (via a trigger — see setup SQL). Comparing "is remote newer"
// this way can never be fooled by a device's clock being wrong or two
// clocks disagreeing by a few seconds, unlike comparing timestamps.
function getConfirmedRev(){ try{ return parseInt(localStorage.getItem(REV_KEY)||'0',10) || 0; } catch(e){ return 0; } }
function setConfirmedRev(rev){ try{ localStorage.setItem(REV_KEY, String(rev||0)); } catch(e){} }

function getSyncCode(){ try{ return localStorage.getItem(CODE_KEY) || ''; } catch(e){ return ''; } }
function sbHeaders(){ return { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' }; }
function setSyncStatus(s){ syncStatus = s; updateSyncDot(); }
function updateSyncDot(){
  const el = document.getElementById('syncDot');
  if(!el) return;
  const map = {
    off:    ['#8b8b8b', 'Sync off — tap to set up'],
    pending:['#C99A3B', 'Saving…'],
    syncing:['#C99A3B', 'Syncing…'],
    synced: ['#7FA37C', 'Synced'],
    error:  ['#A8444B', 'Sync error — will retry']
  };
  const [color, title] = map[syncStatus] || map.off;
  el.style.background = color;
  el.title = title;
}
async function pullRemote(code){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${SYNC_TABLE}?code=eq.${encodeURIComponent(code)}&select=data,rev`, { headers: sbHeaders() });
  if(!r.ok) throw new Error('pull failed: ' + r.status);
  const rows = await r.json();
  return rows.length ? rows[0] : null;
}
async function pushRemote(){
  const code = getSyncCode();
  if(!code) return;
  setSyncStatus('syncing');
  // Always push the freshest on-disk copy, not just whatever this tab
  // happens to have in memory — closes any remaining staleness window,
  // including from another tab's write this tab hasn't processed yet.
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ state = Object.assign(defaultState(), JSON.parse(raw)); if(!state.meta) state.meta = {}; }
  } catch(e){}
  const token = (() => { try{ return localStorage.getItem(DIRTY_KEY); } catch(e){ return null; } })();
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${SYNC_TABLE}?on_conflict=code`, {
      method:'POST',
      headers: Object.assign(sbHeaders(), { 'Prefer':'resolution=merge-duplicates,return=representation' }),
      body: JSON.stringify([{ code, data: state }])
    });
    if(!r.ok) throw new Error('push failed: ' + r.status);
    const rows = await r.json();
    if(rows && rows[0] && typeof rows[0].rev === 'number'){ setConfirmedRev(rows[0].rev); }
    pushSeq++;
    // Only clear the dirty flag if no NEW change arrived while this push was
    // in flight — otherwise re-queue so the newest change also gets pushed.
    try{
      if(localStorage.getItem(DIRTY_KEY) === token){ localStorage.removeItem(DIRTY_KEY); setSyncStatus('synced'); }
      else { queueSync(); }
    } catch(e){ setSyncStatus('synced'); }
  } catch(e){
    console.error('Sync push error', e);
    setSyncStatus('error');
  }
}
function queueSync(){
  setSyncStatus('pending');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushRemote, 400);
}
function adoptRemote(row){
  state = Object.assign(defaultState(), row.data);
  if(!state.meta) state.meta = {};
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    localStorage.removeItem(DIRTY_KEY);
  } catch(e){}
  setConfirmedRev(row.rev);
  setSyncStatus('synced');
}
async function initialSync(){
  const code = getSyncCode();
  if(!code){ setSyncStatus('off'); return; }
  setSyncStatus('syncing');
  const seqBefore = pushSeq;
  try{
    const row = await pullRemote(code);
    const dirty = localStorage.getItem(DIRTY_KEY);
    // If anything changed locally while we were fetching — a new unsaved
    // change (dirty) or a push that already completed (pushSeq moved) —
    // the fetched row is stale. Local data wins; push it instead.
    if(dirty){ await pushRemote(); }
    else if(pushSeq !== seqBefore){ setSyncStatus('synced'); }
    else if(row && row.rev !== getConfirmedRev()){ adoptRemote(row); render(); }
    else if(row){ setSyncStatus('synced'); } // already up to date
    else { await pushRemote(); }
  } catch(e){
    console.error('Initial sync error', e);
    setSyncStatus('error');
  }
}
async function pollRemote(){
  const code = getSyncCode();
  if(!code) return;
  if(localStorage.getItem(DIRTY_KEY)) return; // don't clobber unsent local changes
  const seqBefore = pushSeq;
  try{
    const row = await pullRemote(code);
    // Re-check after the fetch: if a change or push happened while we were
    // fetching, this row is stale — skip it.
    if(localStorage.getItem(DIRTY_KEY)) return;
    if(pushSeq !== seqBefore) return;
    if(row && row.rev !== getConfirmedRev()){
      adoptRemote(row);
      render();
    }
  } catch(e){ /* quiet — poll will retry */ }
}
function toggleSyncSettings(){ ui.syncSettingsOpen = !ui.syncSettingsOpen; render(); }
async function enableSync(code){
  code = (code||'').trim();
  if(code.length < 6){ showToast('Please use a longer code — at least 6 characters, ideally a few random words.'); return; }
  setSyncStatus('syncing');
  try{
    const row = await pullRemote(code);
    if(row && state.goals.length){
      ui.pendingJoin = { code, row };
      render(); updateSyncDot();
      return;
    }
    try{ localStorage.setItem(CODE_KEY, code); } catch(e){}
    if(row){ adoptRemote(row); showToast('Joined the existing dashboard for this code.'); }
    else { await pushRemote(); showToast('Sync enabled.'); }
    ui.syncSettingsOpen = false;
    render();
  } catch(e){
    console.error(e);
    setSyncStatus(getSyncCode() ? 'error' : 'off');
    showToast('Could not reach the sync server — check your connection and try again.');
  }
}
function confirmJoinRemote(){
  const p = ui.pendingJoin;
  try{ localStorage.setItem(CODE_KEY, p.code); } catch(e){}
  adoptRemote(p.row);
  ui.pendingJoin = null; ui.syncSettingsOpen = false;
  render();
  showToast('Loaded the dashboard for that sync code.');
}
function keepLocalOverRemote(){
  const p = ui.pendingJoin;
  try{ localStorage.setItem(CODE_KEY, p.code); localStorage.setItem(DIRTY_KEY,'1'); } catch(e){}
  ui.pendingJoin = null; ui.syncSettingsOpen = false;
  pushRemote();
  render();
  showToast('Sync enabled — this device\'s data replaced the cloud copy.');
}
function cancelJoin(){ ui.pendingJoin = null; setSyncStatus('off'); render(); }
function turnOffSync(){
  try{ localStorage.removeItem(CODE_KEY); localStorage.removeItem(DIRTY_KEY); localStorage.removeItem(REV_KEY); } catch(e){}
  setSyncStatus('off');
  ui.syncSettingsOpen = false;
  render();
  showToast('Sync turned off — your data stays on this device.');
}
setInterval(pollRemote, 60000);

// Flush any pending change immediately when the tab is closed or backgrounded,
// rather than waiting on the debounce timer — this closes the small window
// where a quick check-and-leave could get overwritten by a later pull.
// When the app is merely backgrounded (switching apps, screen lock, a
// notification), the page is still alive — so do a real, confirmed push.
// Only on true pagehide (navigating away / being closed) do we fall back
// to a best-effort send we can't confirm — and critically, we do NOT
// mark it as synced in that case, so a failed send safely retries next
// time the app opens instead of silently losing the change.
function flushOnBackground(){
  if(!document.hidden) return;
  try{ if(!localStorage.getItem(DIRTY_KEY)) return; } catch(e){ return; }
  // Refresh from localStorage first: if this is a stale leftover tab, the
  // freshest data lives there, not in this tab's memory.
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ state = Object.assign(defaultState(), JSON.parse(raw)); if(!state.meta) state.meta = {}; }
  } catch(e){}
  clearTimeout(syncTimer);
  pushRemote();
}
function flushOnUnload(){
  const code = getSyncCode();
  if(!code) return;
  try{ if(!localStorage.getItem(DIRTY_KEY)) return; } catch(e){ return; }
  clearTimeout(syncTimer);
  try{
    fetch(`${SUPABASE_URL}/rest/v1/${SYNC_TABLE}?on_conflict=code`, {
      method:'POST',
      headers: Object.assign(sbHeaders(), { 'Prefer':'resolution=merge-duplicates' }),
      body: JSON.stringify([{ code, data: state }]),
      keepalive: true // lets this small request attempt to finish even as the tab closes
    });
    // Deliberately NOT clearing the dirty flag here — we can't confirm this
    // request actually completed, so the next app open will safely re-push
    // the current data via the normal, confirmed path.
  } catch(e){ /* best effort — will retry via dirty flag on next open */ }
}
document.addEventListener('visibilitychange', flushOnBackground);
window.addEventListener('pagehide', flushOnUnload);

// If ANOTHER open tab of this same site (e.g. a stray browser tab left open
// alongside the Home Screen app) saves a change, the browser fires this
// event here. Without this, this tab's in-memory copy could still be
// yesterday's data, and if THIS tab later saves anything (even just its
// own background sync check), it could silently overwrite the other tab's
// newer changes. Re-reading here keeps every open tab in step with
// whichever one actually has the latest data.
window.addEventListener('storage', (e) => {
  if(e.key === STORAGE_KEY && e.newValue){
    try{
      const parsed = JSON.parse(e.newValue);
      state = Object.assign(defaultState(), parsed);
      if(!state.meta) state.meta = {};
      render();
    } catch(err){ /* ignore malformed write */ }
  }
});

/* ---------- Categories ---------- */
function addCategory(name){
  if(!name.trim()) return;
  state.categories.push({ id: uid('cat'), name: name.trim(), color: PALETTE[state.categories.length % PALETTE.length] });
  saveState(); render();
}
function removeCategory(id){
  if(ui.confirmDeleteCategory !== id){ ui.confirmDeleteCategory = id; render(); return; }
  ui.confirmDeleteCategory = null;
  state.goals.filter(g=>g.categoryId===id).forEach(g => removeGoalData(g.id));
  state.goals = state.goals.filter(g=>g.categoryId!==id);
  state.categories = state.categories.filter(c=>c.id!==id);
  saveState(); render();
}
function renameCategory(id, name){
  if(!name.trim()) return;
  const cat = state.categories.find(c=>c.id===id);
  cat.name = name.trim();
  ui.editingCategory = null;
  saveState(); render();
}
function startEditCategory(id){ ui.editingCategory = id; render(); }
function cancelEditCategory(){ ui.editingCategory = null; render(); }
function toggleColorPicker(id){
  ui.colorPickerFor = (ui.colorPickerFor===id) ? null : id;
  render();
}
function setCategoryColor(id, color){
  const cat = state.categories.find(c=>c.id===id);
  cat.color = color;
  ui.colorPickerFor = null;
  saveState(); render();
}
function moveCategory(id, dir){
  const i = state.categories.findIndex(c=>c.id===id);
  const j = i + dir;
  if(i<0 || j<0 || j>=state.categories.length) return;
  [state.categories[i], state.categories[j]] = [state.categories[j], state.categories[i]];
  saveState(); render();
}
function moveGoal(id, dir){
  const g = state.goals.find(x=>x.id===id);
  if(!g) return;
  const siblings = state.goals.filter(x=>x.categoryId===g.categoryId);
  const pos = siblings.indexOf(g);
  const target = siblings[pos+dir];
  if(!target) return;
  const i = state.goals.indexOf(g), j = state.goals.indexOf(target);
  state.goals[i] = target; state.goals[j] = g;
  saveState(); render();
}

/* ---------- Goals ---------- */
function removeGoalData(id){
  delete state.checkLogs[id]; delete state.tallyLogs[id]; delete state.amountLogs[id];
  delete state.stageState[id]; delete state.stageHistory[id]; delete state.listItems[id];
}
function removeGoal(id){

  ui.confirmDeleteGoal = null;
  ui.actionMenuFor = null;

  saveState(); render();
}
function startAddGoal(categoryId){
  ui.addingGoalFor = categoryId;
  ui.draft = { type:'checkbox', cadence:'daily', name:'', target:4, unit:'', resetCadence:'weekly', stagesText:'' };
  render();
}
function cancelAddGoal(){ ui.addingGoalFor = null; ui.editingGoal = null; render(); }
function startEditGoal(goalId){
  const g = state.goals.find(x=>x.id===goalId);
  if(!g) return;
  ui.editingGoal = goalId;
  ui.addingGoalFor = null;
  ui.actionMenuFor = null;
  ui.draft = {
    type: g.type, name: g.name, cadence: g.cadence||'daily',
    target: g.target||4, unit: g.unit||'', resetCadence: g.resetCadence||'weekly',
    stagesText: (g.stages||[]).join(', ')
  };
  render();
}
function saveEditedGoal(){
  const g = state.goals.find(x=>x.id===ui.editingGoal);
  if(!g) return;
  const d = ui.draft;
  if(!d.name || !d.name.trim()){ showToast('Please give the goal a name.'); return; }
  g.name = d.name.trim();
  if(g.type==='checkbox'){ g.cadence = d.cadence; }
  else if(g.type==='tally'){ g.cadence = d.cadence; g.target = Number(d.target)||1; }
  else if(g.type==='amount'){ g.target = Number(d.target)||1; g.unit = (d.unit||'').trim(); g.resetCadence = d.resetCadence; }
  else if(g.type==='stages'){
    const stages = (d.stagesText||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(stages.length < 2){ showToast('Please enter at least two stages, separated by commas.'); return; }
    g.stages = stages;
    state.stageState[g.id] = Math.min(state.stageState[g.id]||0, stages.length-1);
  }
  ui.editingGoal = null;
  saveState(); render();
}
function updateDraft(field, value){
  ui.draft[field] = value;
  if(field==='type'){
    // Each type has its own valid cadence options — switching type must reset
    // cadence to a valid one, or a stale value from the previous type can
    // silently persist even though the dropdown visually shows something else.
    if(value==='checkbox') ui.draft.cadence = 'daily';
    else if(value==='tally') ui.draft.cadence = 'weekly';
    else if(value==='amount') ui.draft.resetCadence = 'weekly';
  }
  render();
}
function createGoal(categoryId){
  const d = ui.draft;
  if(!d.name || !d.name.trim()){ showToast('Please give the goal a name.'); return; }
  const goal = { id: uid('goal'), categoryId, name: d.name.trim(), type: d.type, createdAt: todayStr() };
  if(d.type==='checkbox'){ goal.cadence = d.cadence; }
  else if(d.type==='tally'){ goal.cadence = d.cadence; goal.target = Number(d.target)||1; }
  else if(d.type==='amount'){ goal.target = Number(d.target)||1; goal.unit = (d.unit||'').trim(); goal.resetCadence = d.resetCadence; }
  else if(d.type==='stages'){
    const stages = (d.stagesText||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(stages.length < 2){ showToast('Please enter at least two stages, separated by commas (e.g. Start, In Progress, Done).'); return; }
    goal.stages = stages;
    state.stageState[goal.id] = 0;
  }
  state.goals.push(goal);
  ui.addingGoalFor = null;
  saveState(); render();
}

/* ---------- Checkbox type ---------- */
function toggleCheckbox(goalId, cadence){
  if(!state.checkLogs[goalId]) state.checkLogs[goalId] = {};
  const log = state.checkLogs[goalId];
  if(cadence==='monthly'){
    const m = thisMonth();
    if(log[m]) delete log[m]; else log[m] = true;
  } else if(cadence==='weekly'){
    const wk = weekDates(todayStr());
    const done = wk.some(d => log[d]);
    if(done){ wk.forEach(d => { delete log[d]; }); }
    else { log[todayStr()] = true; }
  } else {
    const t = todayStr();
    if(log[t]) delete log[t]; else log[t] = true;
  }
  saveState(); render();
}
function checkboxDoneToday(goalId){ return !!(state.checkLogs[goalId] && state.checkLogs[goalId][todayStr()]); }
function checkboxDoneThisWeek(goalId){
  const log = state.checkLogs[goalId] || {};
  return weekDates(todayStr()).some(d => log[d]);
}
function checkboxDoneThisMonth(goalId){ return !!(state.checkLogs[goalId] && state.checkLogs[goalId][thisMonth()]); }
function dailyStreak(goalId){
  const log = state.checkLogs[goalId] || {};
  let streak = 0; let cursor = todayStr();
  if(!log[cursor]) cursor = addDays(cursor,-1);
  while(log[cursor]){ streak++; cursor = addDays(cursor,-1); }
  return streak;
}
function weeklyStreak(goalId){
  const log = state.checkLogs[goalId] || {};
  let streak = 0; let weekStart = weekDates(todayStr())[0]; const current = weekStart;
  while(true){
    const hit = weekDates(weekStart).some(d=>log[d]);
    if(hit){ streak++; weekStart = addDays(weekStart,-7); }
    else if(weekStart===current){ weekStart = addDays(weekStart,-7); }
    else break;
  }
  return streak;
}

/* ---------- Tally type ---------- */
function logTally(goalId){
  if(!state.tallyLogs[goalId]) state.tallyLogs[goalId] = [];
  state.tallyLogs[goalId].push(todayStr());
  saveState(); render();
}
function undoTally(goalId){
  const arr = state.tallyLogs[goalId] || [];
  const goal = state.goals.find(g=>g.id===goalId);
  if(!arr.length || !goal) return;
  // only undo entries within the current period
  let inPeriod;
  if(goal.cadence==='monthly'){ inPeriod = d => monthKey(d)===thisMonth(); }
  else if(goal.cadence==='yearly'){ const y = todayStr().slice(0,4); inPeriod = d => d.slice(0,4)===y; }
  else { const wk = weekDates(todayStr()); inPeriod = d => wk.includes(d); } // weekly + unrecognized default
  for(let i=arr.length-1; i>=0; i--){
    if(inPeriod(arr[i])){ arr.splice(i,1); saveState(); render(); return; }
  }
  showToast('Nothing logged this '+cadenceLabel(goal.cadence)+' to undo.');
}
function tallyCountInPeriod(goalId, cadence, refDate=todayStr()){
  const arr = state.tallyLogs[goalId] || [];
  if(cadence==='monthly'){ const m = monthKey(refDate); return arr.filter(d=>monthKey(d)===m).length; }
  if(cadence==='yearly'){ const y = refDate.slice(0,4); return arr.filter(d=>d.slice(0,4)===y).length; }
  // 'weekly' and any unrecognized/legacy value default to weekly — safer than
  // silently falling through to an all-time total that never resets.
  const wk = weekDates(refDate); return arr.filter(d=>wk.includes(d)).length;
}

/* ---------- Amount type ---------- */
function logAmount(goalId, amount){
  if(!amount || isNaN(amount)) return;
  if(!state.amountLogs[goalId]) state.amountLogs[goalId] = [];
  state.amountLogs[goalId].push({ date: todayStr(), amount: Number(amount) });
  saveState(); render();
}
function amountSumInPeriod(goalId, resetCadence, refDate=todayStr()){
  const arr = state.amountLogs[goalId] || [];
  let filtered = arr;
  if(resetCadence==='daily') filtered = arr.filter(e=>e.date===refDate);
  else if(resetCadence==='weekly'){ const wk = weekDates(refDate); filtered = arr.filter(e=>wk.includes(e.date)); }
  else if(resetCadence==='monthly'){ const m = monthKey(refDate); filtered = arr.filter(e=>monthKey(e.date)===m); }
  else if(resetCadence==='yearly'){ const y = refDate.slice(0,4); filtered = arr.filter(e=>e.date.slice(0,4)===y); }
  return filtered.reduce((a,e)=>a+e.amount,0);
}
function amountSumAllTime(goalId){
  return (state.amountLogs[goalId]||[]).reduce((a,e)=>a+e.amount,0);
}

/* ---------- Stages type ---------- */
function setStageById(goalId, index){
  const goal = state.goals.find(g=>g.id===goalId);
  if(!goal || !goal.stages) return;
  const clamped = Math.max(0, Math.min(goal.stages.length-1, index));
  state.stageState[goal.id] = clamped;
  const m = thisMonth();
  if(!state.stageHistory[goal.id]) state.stageHistory[goal.id] = {};
  state.stageHistory[goal.id][m] = clamped;
  saveState(); render();
}

/* ---------- List type ---------- */
function addListItem(goalId, text){
  if(!text.trim()) return;
  if(!state.listItems[goalId]) state.listItems[goalId] = [];
  state.listItems[goalId].unshift({ id: uid('item'), text: text.trim(), done:false, date: todayStr() });
  saveState(); render();
}
function toggleListItem(goalId, itemId){
  const item = (state.listItems[goalId]||[]).find(i=>i.id===itemId);
  if(item){ item.done = !item.done; saveState(); render(); }
}
function removeListItem(goalId, itemId){
  state.listItems[goalId] = (state.listItems[goalId]||[]).filter(i=>i.id!==itemId);
  saveState(); render();
}

/* ---------- Backup ---------- */
function exportBackup(){
  state.meta.lastBackupAt = todayStr();
  saveState();
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'first-light-backup-' + todayStr() + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  render();
}
function daysSince(dateStr){
  if(!dateStr) return Infinity;
  return Math.floor((new Date(todayStr()+'T00:00:00') - new Date(dateStr+'T00:00:00')) / 86400000);
}
function shouldNudgeBackup(){
  if(!state.goals.length) return false;
  if(getSyncCode()) return false; // cloud sync is on — data is already backed up
  const last = state.meta.lastBackupAt || state.meta.firstUseAt;
  if(daysSince(last) < 30) return false;
  if(state.meta.nudgeDismissedAt && daysSince(state.meta.nudgeDismissedAt) < 7) return false;
  return true;
}
function dismissBackupNudge(){
  state.meta.nudgeDismissedAt = todayStr();
  saveState(); render();
}
function importBackup(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const parsed = JSON.parse(e.target.result);
      if(typeof parsed !== 'object' || parsed === null || Array.isArray(parsed)){ showToast('That file could not be read as a valid backup.'); return; }
      ui.pendingImport = parsed;
      render();
    } catch(err){ showToast('That file could not be read as a valid backup.'); }
  };
  reader.readAsText(file);
}
function confirmImport(){
  state = Object.assign(defaultState(), ui.pendingImport);
  ui.pendingImport = null;
  saveState(); render();
  showToast('Backup imported successfully.');
}
function cancelImport(){ ui.pendingImport = null; render(); }
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('importFile').addEventListener('change', (e) => {
    if(e.target.files[0]) importBackup(e.target.files[0]);
    e.target.value = '';
  });
});

/* ---------- Icons / small helpers ---------- */

function cadenceLabel(c){ return c==='daily' ? 'day' : c==='weekly' ? 'week' : c==='monthly' ? 'month' : c==='yearly' ? 'year' : c; }

    `<button class="icon-btn mini" onclick="toggleActionMenu('${goal.id}')" title="close">×</button>`;

/* ---------- Arc (today's light) ---------- */
function renderArc(){
  const dailyGoals = state.goals.filter(g=>g.type==='checkbox' && g.cadence==='daily');
  const wrap = document.getElementById('arcWrap');
  if(dailyGoals.length===0){
    wrap.innerHTML = `
      <svg width="220" height="120" viewBox="0 0 220 120">
        <path d="M 20 110 A 90 90 0 0 1 200 110" stroke="rgba(239,227,204,0.18)" stroke-width="10" fill="none" stroke-linecap="round"/>
        <circle cx="110" cy="110" r="3.5" fill="#EFE3CC" opacity="0.5"/>
      </svg>
      <div class="arc-label">today's light</div>
      <div class="arc-empty">Add a daily goal to start tracking your light each day.</div>`;
    return;
  }
  const count = dailyGoals.filter(g=>checkboxDoneToday(g.id)).length;
  const frac = count/dailyGoals.length;
  const cx=110, cy=110, r=90;
  function pointAt(t){ const a = Math.PI*(1-t); return [cx + r*Math.cos(a), cy - Math.abs(r*Math.sin(a))]; }
  const segs = 60;
  let bgPath = `M ${cx-r} ${cy} `;
  for(let i=1;i<=segs;i++){ const [x,y]=pointAt(i/segs); bgPath += `L ${x} ${y} `; }
  let fgPath = '';
  if(frac>0){
    fgPath = `M ${cx-r} ${cy} `;
    const fSegs = Math.max(1, Math.round(segs*frac));
    for(let i=1;i<=fSegs;i++){ const [x,y]=pointAt(i/segs); fgPath += `L ${x} ${y} `; }
  }
  wrap.innerHTML = `
    <svg width="220" height="120" viewBox="0 0 220 120">
      <defs>
        <linearGradient id="dawnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#232A4D"/><stop offset="55%" stop-color="#C1623D"/><stop offset="100%" stop-color="#C99A3B"/>
        </linearGradient>
      </defs>
      <path d="${bgPath}" stroke="rgba(239,227,204,0.18)" stroke-width="10" fill="none" stroke-linecap="round"/>
      ${fgPath ? `<path d="${fgPath}" stroke="url(#dawnGrad)" stroke-width="10" fill="none" stroke-linecap="round"/>` : ''}
      <circle cx="${cx}" cy="${cy}" r="3.5" fill="#EFE3CC" opacity="0.5"/>
    </svg>
    <div class="arc-label">today's light</div>
    <div class="arc-frac mono">${count} / ${dailyGoals.length}</div>`;
}

/* ---------- Goal row rendering ---------- */
function renderGoalRow(goal, color){
  if(ui.editingGoal===goal.id) return renderGoalForm(goal.categoryId);
  if(goal.type==='checkbox'){
    if(goal.cadence==='daily'){
      const on = checkboxDoneToday(goal.id);
      const streak = dailyStreak(goal.id);
      return `<div class="row">
        <button class="check ${on?'on':''}" style="${on?`background:${color};`:''}" onclick="toggleCheckbox('${goal.id}','daily')">${checkIcon()}</button>
        <div class="label">${esc(goal.name)}</div>
        <div class="streak">${streak>0 ? streak+' day'+(streak===1?'':'s') : '—'}</div>
        ${goalActions(goal)}
      </div>`;
    }
    if(goal.cadence==='weekly'){
      const on = checkboxDoneThisWeek(goal.id);
      const streak = weeklyStreak(goal.id);
      return `<div class="row">
        <button class="check ${on?'on':''}" style="${on?`background:${color};`:''}" onclick="toggleCheckbox('${goal.id}','weekly')">${checkIcon()}</button>
        <div class="label">${esc(goal.name)}</div>
        <div class="streak">${streak>0 ? streak+' wk streak' : '—'}</div>
        ${goalActions(goal)}
      </div>`;
    }
    const on = checkboxDoneThisMonth(goal.id);
    return `<div class="row">
      <button class="check ${on?'on':''}" style="${on?`background:${color};`:''}" onclick="toggleCheckbox('${goal.id}','monthly')">${checkIcon()}</button>
      <div class="label">${esc(goal.name)}</div>
      <div class="meta">this month</div>
      ${goalActions(goal)}
    </div>`;
  }
  if(goal.type==='tally'){
    const count = tallyCountInPeriod(goal.id, goal.cadence);
    const ticks = goal.target<=10;
    return `<div class="row">
      <div class="label">${esc(goal.name)} — ${count} / ${goal.target} this ${cadenceLabel(goal.cadence)}</div>
      <button class="util-btn tiny" style="background:${color};" onclick="logTally('${goal.id}')">+1</button>
      <button class="icon-btn" onclick="undoTally('${goal.id}')" title="undo last">↺</button>
      ${goalActions(goal)}
    </div>
    ${ticks ? `<div class="row" style="padding-top:0;border-top:none;"><div class="tally">${Array.from({length:goal.target}).map((_,i)=>`<div class="tick ${count>i?'on':''}" style="${count>i?`background:${color};`:''}"></div>`).join('')}</div></div>` : ''}`;
  }
  if(goal.type==='amount'){
    const sum = amountSumInPeriod(goal.id, goal.resetCadence);
    const pct = clampPct(sum/goal.target*100);
    return `<div class="row" style="flex-direction:column; align-items:stretch; gap:6px;">
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="label">${esc(goal.name)}</div>
        ${goalActions(goal)}
      </div>
      <div class="meta">${sum} / ${goal.target} ${esc(goal.unit||'')} this ${goal.resetCadence==='never'?'(all time)':cadenceLabel(goal.resetCadence)}</div>
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%; background:${color};"></div></div>

/* ---------- Scorecard engine ---------- */
function gradeLetter(pct){
  if(pct>=95) return 'A+'; if(pct>=90) return 'A'; if(pct>=75) return 'B';
  if(pct>=50) return 'C'; if(pct>=25) return 'D'; return 'F';
}
function gradeColor(pct){
  if(pct>=90) return '#6E8B6B'; if(pct>=75) return '#C99A3B'; if(pct>=50) return '#C1623D';
  if(pct>=25) return '#B06A78'; return '#A8444B';
}
function weeksElapsedIn(m){ return Math.max(Math.ceil(daysConsideredFor(m)/7), 1); }

// Returns null if the goal didn't exist yet during month m.
// Otherwise returns { days, startDay } — days = how many days of month m count toward
// this goal's grading (from its creation date forward), startDay = day-of-month it started.
function effectiveWindowFor(goal, m){
  const created = goal.createdAt || '1970-01-01';
  const createdMonth = created.slice(0,7);
  const daysConsidered = daysConsideredFor(m);
  if(createdMonth > m) return null;
  if(createdMonth === m){
    const startDay = parseInt(created.slice(8,10),10);
    const days = Math.max(1, daysConsidered - startDay + 1);
    return { days, startDay };
  }
  return { days: daysConsidered, startDay: 1 };
}

function goalPctForMonth(goal, m){
  const isCurrent = m===thisMonth();
  const win = effectiveWindowFor(goal, m);
  if(!win) return null; // goal didn't exist yet this month
  const daysConsidered = Math.max(daysConsideredFor(m),1);
  const effDays = win.days;
  const effWeeks = Math.max(Math.ceil(effDays/7), 1);
  const monthNum = parseInt(m.split('-')[1],10);
  const proration = effDays/daysConsidered; // fraction of the month this goal has existed for

  if(goal.type==='checkbox'){
    const log = state.checkLogs[goal.id] || {};
    if(goal.cadence==='daily'){
      const count = Object.keys(log).filter(k=>k.length===10 && monthKey(k)===m && log[k]).length;
      return clampPct(count/effDays*100);
    }
    if(goal.cadence==='weekly'){
      const loggedDays = Object.keys(log).filter(k=>k.length===10 && monthKey(k)===m && log[k]);
      const weeksHit = new Set(loggedDays.map(d=>weekDates(d)[0]));
      return clampPct(weeksHit.size/effWeeks*100);
    }
    return log[m] ? 100 : 0;
  }
  if(goal.type==='tally'){
    const arr = state.tallyLogs[goal.id] || [];
    const countThisMonth = arr.filter(d=>monthKey(d)===m).length;
    if(goal.cadence==='monthly') return clampPct(countThisMonth/Math.max(goal.target*proration,1)*100);
    if(goal.cadence==='yearly'){
      const y = m.slice(0,4);
      const countThisYear = arr.filter(d=>d.slice(0,4)===y && d<=m+'-31').length;
      return clampPct(countThisYear/(goal.target*monthNum/12)*100);
    }
    // 'weekly' and any unrecognized/legacy value default to weekly scoring
    return clampPct(countThisMonth/(goal.target*effWeeks)*100);
  }
  if(goal.type==='amount'){
    if(goal.resetCadence==='never') return null;
    const arr = state.amountLogs[goal.id] || [];
    if(goal.resetCadence==='daily'){
      const sum = arr.filter(e=>monthKey(e.date)===m).reduce((a,e)=>a+e.amount,0);
      return clampPct(sum/(goal.target*effDays)*100);
    }
    if(goal.resetCadence==='weekly'){
      const sum = arr.filter(e=>monthKey(e.date)===m).reduce((a,e)=>a+e.amount,0);
      return clampPct(sum/(goal.target*effWeeks)*100);
    }
    if(goal.resetCadence==='monthly'){
      const sum = arr.filter(e=>monthKey(e.date)===m).reduce((a,e)=>a+e.amount,0);
      return clampPct(sum/Math.max(goal.target*proration,1)*100);
    }
    if(goal.resetCadence==='yearly'){
      const y = m.slice(0,4);
      const sum = arr.filter(e=>e.date.slice(0,4)===y && e.date<=m+'-31').reduce((a,e)=>a+e.amount,0);
      return clampPct(sum/(goal.target*monthNum/12)*100);
    }
  }
  if(goal.type==='stages'){
    const hist = state.stageHistory[goal.id] || {};
    let stage = hist[m];
    if(stage===undefined){
      const prior = Object.keys(hist).filter(k=>k<m).sort();
      if(prior.length) stage = hist[prior[prior.length-1]];
      else if(isCurrent) stage = state.stageState[goal.id]||0;
      else return null;
    }
    return clampPct(stage/(goal.stages.length-1)*100);
  }
  return null; // list type — not graded
}
function gradeForMonth(m){
  const categories = {};
  state.categories.forEach(cat => {
    const goalsInCat = state.goals.filter(g=>g.categoryId===cat.id);
    const pcts = goalsInCat.map(g=>goalPctForMonth(g,m)).filter(p=>p!==null);
    categories[cat.id] = pcts.length ? pcts.reduce((a,b)=>a+b,0)/pcts.length : null;
  });
  const applicable = Object.values(categories).filter(p=>p!==null);
  const overallPct = applicable.length ? applicable.reduce((a,b)=>a+b,0)/applicable.length : null;
  return { overallPct, categories, isCurrentMonth: m===thisMonth() };
}
function collectMonths(){
  const months = new Set([thisMonth()]);
  Object.values(state.checkLogs).forEach(log => Object.keys(log).forEach(k => { if(k.length===10) months.add(monthKey(k)); else if(k.length===7) months.add(k); }));
  Object.values(state.tallyLogs).forEach(arr => arr.forEach(d=>months.add(monthKey(d))));
  Object.values(state.amountLogs).forEach(arr => arr.forEach(e=>months.add(monthKey(e.date))));
  Object.values(state.stageHistory).forEach(hist => Object.keys(hist).forEach(m=>months.add(m)));
  return Array.from(months).sort().reverse();
}
function monthLabelFor(m){
  const [y,mo] = m.split('-').map(Number);
  return new Date(y, mo-1, 1).toLocaleDateString(undefined, { month:'long', year:'numeric' });
}

/* ---------- Monthly summary stat per goal ---------- */
function summaryStatFor(goal, m){
  const win = effectiveWindowFor(goal, m);
  if(!win) return 'not started yet';
  const effDays = win.days;
  const effWeeks = Math.max(Math.ceil(effDays/7), 1);
  if(goal.type==='checkbox'){
    const log = state.checkLogs[goal.id] || {};
    if(goal.cadence==='daily'){
      const count = Object.keys(log).filter(k=>k.length===10 && monthKey(k)===m && log[k]).length;
      return `${count} / ${effDays} days`;
    }
    if(goal.cadence==='weekly'){
      const loggedDays = Object.keys(log).filter(k=>k.length===10 && monthKey(k)===m && log[k]);
      const weeksHit = new Set(loggedDays.map(d=>weekDates(d)[0])).size;
      return `${weeksHit} / ${effWeeks} weeks`;
    }
    return log[m] ? 'Done ✓' : 'Not yet';
  }
  if(goal.type==='tally'){
    const count = (state.tallyLogs[goal.id]||[]).filter(d=>monthKey(d)===m).length;
    return `${count} logged this month`;
  }
  if(goal.type==='amount'){
    const sum = (state.amountLogs[goal.id]||[]).filter(e=>monthKey(e.date)===m).reduce((a,e)=>a+e.amount,0);
    const allTime = amountSumAllTime(goal.id);
    return goal.resetCadence==='never' ? `${allTime} ${esc(goal.unit||'')} all-time` : `${sum} ${esc(goal.unit||'')} this month`;
  }
  if(goal.type==='stages'){
    const hist = state.stageHistory[goal.id]||{};
    const idx = hist[m] !== undefined ? hist[m] : (m===thisMonth() ? (state.stageState[goal.id]||0) : null);
    return idx===null ? '—' : goal.stages[idx];
  }
  if(goal.type==='list'){
    const items = state.listItems[goal.id]||[];
    const thisMonthCount = items.filter(i=>monthKey(i.date)===m).length;
    return `${thisMonthCount} added this month`;
  }
  return '—';
}

            ${getSyncCode() ? `
            <div class="type-hint" style="margin-top:8px;">✓ Sync is on — code: ${esc(getSyncCode())}</div>
            ` : `
            <div class="add-row" style="margin-top:10px;">
              <input type="text" id="guideSyncInput" placeholder="e.g. copper-falcon-sunrise" />
              <button class="util-btn" style="background:#232A4D;" onclick="enableSync(document.getElementById('guideSyncInput').value)">Enable sync</button>
            </div>
            <div class="type-hint" style="margin-top:6px;">Treat the code like a password — anyone who knows it can view and change that dashboard. Prefer to keep everything on this device only? Skip this step; you can turn sync on later by tapping the dot in the top corner.</div>
            `}
          </div>
        </div>
        <div class="guide-step">
          <div class="num">2</div>
          <div class="txt"><b>Add a category</b> using the box above — a broad area of life you want to track, like "Faith," "Health," "Work," or "Family." Each gets its own color; tap the color dot anytime to change it, or ✎ to rename.</div>
        </div>
        <div class="guide-step">
          <div class="num">3</div>
          <div class="txt"><b>Add goals inside each category</b> with "+ Add goal," choosing the tracking style that fits (see below). Tap ⋯ on any goal later to edit, reorder, or delete it.</div>
        </div>
        <div class="guide-step">
          <div class="num">4</div>
          <div class="txt"><b>Check in daily.</b> The arc at the top fills as you complete each day's goals. Everything rolls up into a monthly summary and a month-by-month scorecard with letter grades, so you can watch your trends over time — not just today.</div>
        </div>

        <div class="guide-types">
          <div class="guide-type-row"><span class="tname">Checkbox</span><span class="tdesc">Done / not done — daily, weekly, or monthly. Builds a streak. Good for habits like "read scripture" or "call a parent."</span></div>
          <div class="guide-type-row"><span class="tname">Tally</span><span class="tdesc">Count occurrences toward a target, like "gym, 4x a week." Tap +1 each time; ↺ undoes the latest.</span></div>
          <div class="guide-type-row"><span class="tname">Amount</span><span class="tdesc">Log numbers toward a target — save $500 a month, read 200 pages. Resets on the schedule you choose, or never.</span></div>
          <div class="guide-type-row"><span class="tname">Stages</span><span class="tdesc">Move through custom steps you define, like "Start → Study → Practice → Exam → Complete" for a certification.</span></div>
          <div class="guide-type-row"><span class="tname">List</span><span class="tdesc">An open-ended checklist or log with no fixed target — recipes to try, people to reach out to. Not graded.</span></div>
        </div>

        <div class="guide-note">The dot in the top corner shows sync status: gray = off, amber = saving, green = synced, red = error (it retries on its own). Tip: tap Share → "Add to Home Screen" in Safari or Chrome and First Light will open full-screen like its own app. Even with sync on, the occasional "Export backup" gives you a file copy that's entirely yours.</div>
      </div>
      ` : ''}
      ${summaryHtml}
      ${scorecardHtml}
    </div>
    <div class="footer-note">first light</div>
  `;
  if(restoreInput){
    const el = document.getElementById(restoreInput.id);
    if(el){
      el.value = restoreInput.value;
      el.focus();
      try{ if(restoreInput.start!=null) el.setSelectionRange(restoreInput.start, restoreInput.end); } catch(e){}
    }
  }
  updateSyncDot();
}

loadState();
initialSync();

// Offline support: register the service worker (requires sw.js hosted
// alongside this file; silently skipped where unsupported).
try{
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').then((reg) => {
      // Force a check for a newer version every time the app opens, rather
      // than relying on the browser's own (sometimes infrequent) update
      // schedule — important for a Home Screen app that may resume an old
      // session for a long time instead of doing a full reload.
      reg.update().catch(()=>{});
    }).catch(()=>{});
    // Once a new version has taken over, do one automatic reload so the
    // freshly-updated code actually starts running, instead of sitting
    // installed-but-unused until the next manual close/reopen.
    let refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(refreshed) return;
      refreshed = true;
      location.reload();
    });
  }
} catch(e){ /* sandboxed preview — ignore */ }

</script>
